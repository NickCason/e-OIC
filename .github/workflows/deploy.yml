name: e-OIC CI + Pages Deploy

# Gating jobs run on develop and releases/v*. Deploy fires only from releases/v*.
# Per eTech standards: develop is the trunk; releases/vX.Y.Z branches are cut
# from develop and trigger production deploys.
on:
  push:
    branches:
      - develop
      - 'releases/v*'
      - 'feature_*/**'
  pull_request:
    branches:
      - develop
      - 'feature_*/main'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  e2e-export:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run test:e2e
      - name: Upload sample export
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sample-export
          path: /tmp/eoic-e2e/
          if-no-files-found: error
          retention-days: 30

  unit-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run test:unit

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint

  deploy:
    needs: [build, e2e-export, unit-test, lint]
    if: startsWith(github.ref, 'refs/heads/releases/v')
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
