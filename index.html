<!doctype html>
<html lang="en" class="has-splash">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="./icon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#BE4829" />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon-180.png" />
    <link rel="apple-touch-icon" href="./icon-192.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="e-OIC" />
    <title>e-OIC — Onsite Investigation Checklist</title>
    <style>
      /* Critical splash CSS — inlined so the gradient + animated mark
         paint before src/styles.css streams in.
         Dismissal is driven by JS, NOT a fixed CSS animation delay:
           - Splash holds until React mounts AND a minimum hold has
             elapsed (so the launch beat is always perceptible).
           - Fade-out is an opacity transition (.is-out class).
           - On full removal, .has-splash is stripped from html + body.
         This eliminates the prior timing failures (no-animation runs,
         splash dismissing before UI is ready, orange lingering over
         the rendered UI). */
      html, body { margin: 0; }
      html.has-splash, body.has-splash {
        background: linear-gradient(135deg, #EE6438 0%, #BE4829 45%, #7A2A18 100%);
      }
      #boot-splash {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        width: 100vw;
        height: 100vh;
        height: 100dvh;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #EE6438 0%, #BE4829 45%, #7A2A18 100%);
        opacity: 1;
        transition: opacity 380ms ease;
        pointer-events: none;
      }
      #boot-splash.is-out { opacity: 0; }
      #boot-splash svg {
        width: 38vmin;
        max-width: 220px;
        height: auto;
        color: #ffffff; /* loader uses currentColor for fills */
        opacity: 0;
        transform: scale(0.94);
        animation: boot-mark-in 540ms cubic-bezier(0.22, 1, 0.36, 1) 80ms forwards;
      }
      @keyframes boot-mark-in {
        to { opacity: 1; transform: scale(1); }
      }
      /* EtechLoader animations — continuous loops, so the mark is alive
         for the entire splash duration regardless of dismissal timing. */
      #boot-splash .etech-loader { --etech-dur: 2s; --etech-idle: 0.46; }
      #boot-splash .etech-loader .corner,
      #boot-splash .etech-loader .bar,
      #boot-splash .etech-loader .dot {
        transform-box: fill-box;
        transform-origin: center;
        fill: currentColor;
      }
      #boot-splash .etech-loader .corner {
        opacity: var(--etech-idle);
        animation: boot-corner-pulse var(--etech-dur) cubic-bezier(0.37, 0, 0.22, 1) infinite both;
      }
      #boot-splash .etech-loader .corner.tl { animation-delay: 0s; }
      #boot-splash .etech-loader .corner.tr { animation-delay: calc(var(--etech-dur) * 0.25); }
      #boot-splash .etech-loader .corner.br { animation-delay: calc(var(--etech-dur) * 0.5); }
      #boot-splash .etech-loader .bar {
        opacity: var(--etech-idle);
        animation: boot-bar-pulse var(--etech-dur) cubic-bezier(0.37, 0, 0.22, 1) infinite both;
      }
      #boot-splash .etech-loader .bar.b1 { animation-delay: calc(var(--etech-dur) * 0.75); }
      #boot-splash .etech-loader .bar.b2 { animation-delay: calc(var(--etech-dur) * 0.833333); }
      #boot-splash .etech-loader .bar.b3 { animation-delay: calc(var(--etech-dur) * 0.916667); }
      #boot-splash .etech-loader .dot {
        opacity: 0.48;
        animation: boot-dot-breathe var(--etech-dur) cubic-bezier(0.37, 0, 0.63, 1) infinite both;
      }
      @keyframes boot-corner-pulse {
        0%, 100% { transform: scale(1);     opacity: var(--etech-idle); }
        8%       { transform: scale(1.02);  opacity: 0.58; }
        14%      { transform: scale(1.065); opacity: 0.92; }
        20%      { transform: scale(1.03);  opacity: 0.72; }
        25%      { transform: scale(1);     opacity: var(--etech-idle); }
      }
      @keyframes boot-bar-pulse {
        0%, 100% { transform: scale(1);     opacity: var(--etech-idle); }
        2.5%     { transform: scale(1.02);  opacity: 0.58; }
        4.5%     { transform: scale(1.075); opacity: 0.94; }
        6.5%     { transform: scale(1.035); opacity: 0.72; }
        8.333%   { transform: scale(1);     opacity: var(--etech-idle); }
      }
      @keyframes boot-dot-breathe {
        0%, 100% { transform: scale(1);     opacity: 0.46; }
        50%      { transform: scale(1.045); opacity: 0.9; }
      }
      @media (prefers-reduced-motion: reduce) {
        #boot-splash, #boot-splash svg,
        #boot-splash .corner, #boot-splash .bar, #boot-splash .dot {
          animation-duration: 1ms !important;
        }
      }
    </style>
  </head>
  <body class="has-splash">
    <div id="boot-splash" aria-hidden="true">
      <svg
        xmlns="http://www.w3.org/2000/svg"
        viewBox="0 0 512 512"
        class="etech-loader"
        aria-hidden="true"
        shape-rendering="geometricPrecision"
      >
        <g class="corner tl"><path d="M144.12,236.1h31.03c11.9,0,17.86-14.39,9.45-22.81l-80.72-80.72,28.85-28.85,81.03,81.03c8.06,8.06,21.84,2.35,21.84-9.04v-103.24h-163.13v91.98l71.65,71.65Z"/></g>
        <g class="corner tr"><path d="M439.6,72.47h-163.13v71.51l-.07.07v31.83c0,11.61,14.04,17.43,22.25,9.22l80.61-80.61,28.51,28.51-80.3,80.3c-8.42,8.42-2.46,22.81,9.45,22.81h102.62v-71.58l.07-.07v-91.98Z"/></g>
        <g class="corner br"><path d="M408.11,379.1l-28.85,28.85-80.61-80.61c-8.21-8.21-22.25-2.4-22.25,9.22v31.83l71.15,71.15h91.98v-162.63h-103.25c-11.21,0-16.82,13.55-8.9,21.48l80.72,80.72Z"/></g>
        <g class="dot"><circle cx="255.94" cy="255.94" r="25.46"/></g>
        <g>
          <g transform="translate(-163.13 675.13) rotate(-90)"><g class="bar b1"><rect x="235.6" y="398.73" width="40.8" height="40.8"/></g></g>
          <g transform="translate(-209.29 213.19) rotate(-45)"><g class="bar b2"><rect x="103.98" y="338.83" width="97.44" height="40.8"/></g></g>
          <g transform="translate(-163.13 348.87) rotate(-90)"><g class="bar b3"><rect x="72.47" y="235.6" width="40.8" height="40.8"/></g></g>
        </g>
      </svg>
    </div>
    <div id="root"></div>
    <script>
      // Splash dismissal coordinator. main.jsx (or any other code) calls
      // window.__dismissSplash() when the app is mounted and ready to be
      // shown. We hold the splash for at least MIN_MS so the launch beat
      // is always perceptible, and force-dismiss after MAX_MS as a safety
      // net if main.jsx never calls in (network failure, JS error, etc.).
      (function () {
        var MIN_MS = 800;     // minimum perceived splash duration
        var MAX_MS = 5000;    // hard fallback timeout
        var FADE_MS = 400;    // matches CSS opacity transition
        var startedAt = performance.now();
        var dismissed = false;

        function commit() {
          if (dismissed) return;
          dismissed = true;
          var el = document.getElementById('boot-splash');
          if (el) el.classList.add('is-out');
          setTimeout(function () {
            if (el && el.parentNode) el.parentNode.removeChild(el);
            document.documentElement.classList.remove('has-splash');
            document.body.classList.remove('has-splash');
          }, FADE_MS);
        }

        window.__dismissSplash = function () {
          var elapsed = performance.now() - startedAt;
          if (elapsed >= MIN_MS) commit();
          else setTimeout(commit, MIN_MS - elapsed);
        };

        // Hard fallback. Independent of __dismissSplash being called.
        setTimeout(function () { commit(); }, MAX_MS);
      })();
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
